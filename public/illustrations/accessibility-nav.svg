<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Background -->
  <rect x="20" y="20" width="440" height="320" rx="24" fill="white"/>
  <!-- Floor zones -->
  <rect x="40" y="40" width="100" height="90" rx="12" fill="#CAFFBF"/>
  <rect x="152" y="40" width="140" height="90" rx="12" fill="#FDFFB6"/>
  <rect x="304" y="40" width="136" height="90" rx="12" fill="#FFD6A5"/>
  <rect x="40" y="144" width="180" height="80" rx="12" fill="#FFADAD" opacity="0.5"/>
  <rect x="232" y="144" width="208" height="80" rx="12" fill="#CAFFBF" opacity="0.5"/>
  <rect x="40" y="238" width="400" height="80" rx="12" fill="#FDFFB6" opacity="0.5"/>
  <!-- Accessible route (thicker, rounded, colourful) -->
  <path d="M90 318 L90 184 L320 184 L320 85" stroke="#13B7DA" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="12,7"/>
  <!-- Lift icon at corner -->
  <rect x="302" y="136" width="36" height="56" rx="8" fill="#13B7DA"/>
  <path d="M312 158 L320 150 L328 158" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M312 170 L320 178 L328 170" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Start badge -->
  <circle cx="90" cy="318" r="14" fill="#FFD6A5" stroke="white" stroke-width="3"/>
  <text x="84" y="323" font-size="13" fill="#0F172A" font-family="sans-serif" font-weight="bold">A</text>
  <!-- Destination pin -->
  <path d="M320 85 C320 68 334 58 348 58 C362 58 376 68 376 85 C376 100 348 118 348 118 Z" fill="#13B7DA"/>
  <circle cx="348" cy="84" r="10" fill="white"/>
  <!-- Wheelchair person -->
  <circle cx="90" cy="255" r="14" fill="#FFD6A5"/>
  <path d="M84 270 L84 294 L102 294" stroke="#13B7DA" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M84 270 L96 270 L96 284" stroke="#13B7DA" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="84" cy="306" r="10" stroke="#13B7DA" stroke-width="4" fill="none"/>
  <circle cx="102" cy="306" r="13" stroke="#13B7DA" stroke-width="4" fill="none"/>
  <circle cx="102" cy="306" r="4" fill="#13B7DA"/>
  <!-- Language badges -->
  <rect x="370" y="238" width="72" height="26" rx="13" fill="#FDFFB6"/>
  <text x="380" y="255" font-size="11" fill="#854d0e" font-family="sans-serif" font-weight="bold">EN / AR</text>
  <rect x="370" y="272" width="72" height="26" rx="13" fill="#CAFFBF"/>
  <text x="383" y="289" font-size="11" fill="#166534" font-family="sans-serif" font-weight="bold">FR / ES</text>
  <!-- Audio icon -->
  <circle cx="430" cy="84" r="20" fill="#FFADAD"/>
  <path d="M422 80 Q422 72 430 72 Q438 72 438 80 L438 88 Q438 96 430 96 Q422 96 422 88 Z" fill="white" opacity="0.6"/>
  <path d="M415 82 Q412 90 415 98" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M444 80 Q448 90 444 100" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
