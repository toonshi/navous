<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360" fill="none">
  <!-- Background -->
  <rect width="480" height="360" rx="20" fill="#0D1628"/>

  <!-- Central floor plan snippet -->
  <rect x="140" y="80" width="200" height="200" rx="12" fill="#1E293B" stroke="#C8E8F5" stroke-width="1.5"/>
  <rect x="140" y="80" width="200" height="100" rx="12" fill="none" stroke="#C8E8F5" stroke-width="1.5"/>
  <rect x="240" y="80" width="2" height="200" fill="#D8EFF8"/>
  <rect x="140" y="180" width="200" height="2" fill="#D8EFF8"/>
  <!-- Lift icon center -->
  <rect x="226" y="166" width="28" height="28" rx="6" fill="#13B7DA" opacity="0.15"/>
  <rect x="226" y="166" width="28" height="28" rx="6" fill="none" stroke="#13B7DA" stroke-width="1.5"/>
  <text x="240" y="183" font-family="system-ui,sans-serif" font-size="9" fill="#13B7DA" text-anchor="middle" font-weight="700">LIFT</text>

  <!-- Accessible route path -->
  <path d="M160 340 L160 260 L241 260 L241 196" stroke="#13B7DA" stroke-width="2.5" stroke-dasharray="5,4" fill="none" stroke-linecap="round"/>

  <!-- Entry -->
  <circle cx="160" cy="340" r="8" fill="#13B7DA" opacity="0.2"/>
  <circle cx="160" cy="340" r="4.5" fill="#13B7DA"/>

  <!-- Person with wheelchair icon (simplified) -->
  <circle cx="160" cy="290" r="5" fill="#0A0F1E" opacity="0.15"/>
  <circle cx="160" cy="290" r="3" fill="#13B7DA"/>

  <!-- Language bubbles floating -->
  <g filter="url(#acc-card-shadow)">
    <rect x="28" y="60" width="90" height="36" rx="18" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="73" y="73" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">🇬🇧</text>
    <text x="73" y="87" font-family="system-ui,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">English</text>
  </g>
  <g filter="url(#acc-card-shadow)">
    <rect x="28" y="114" width="90" height="36" rx="18" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="73" y="127" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">🇸🇦</text>
    <text x="73" y="141" font-family="system-ui,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Arabic</text>
  </g>
  <g filter="url(#acc-card-shadow)">
    <rect x="28" y="168" width="90" height="36" rx="18" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="73" y="181" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">🇨🇳</text>
    <text x="73" y="195" font-family="system-ui,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Chinese</text>
  </g>
  <g filter="url(#acc-card-shadow)">
    <rect x="28" y="222" width="90" height="36" rx="18" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="73" y="235" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">🇪🇸</text>
    <text x="73" y="249" font-family="system-ui,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Spanish</text>
  </g>
  <g filter="url(#acc-card-shadow)">
    <rect x="28" y="276" width="90" height="36" rx="18" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="73" y="289" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">🇫🇷</text>
    <text x="73" y="303" font-family="system-ui,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">French</text>
  </g>

  <!-- Right side: feature pills -->
  <g filter="url(#acc-card-shadow)">
    <rect x="362" y="60" width="96" height="40" rx="12" fill="#0A0F1E"/>
    <!-- Wheelchair symbol -->
    <circle cx="382" cy="74" r="4" fill="none" stroke="#13B7DA" stroke-width="1.5"/>
    <path d="M379 79 L379 86 L385 86" stroke="#13B7DA" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="381" cy="90" r="3.5" fill="none" stroke="#13B7DA" stroke-width="1.5"/>
    <text x="393" y="73" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="600">Wheelchair</text>
    <text x="393" y="85" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748B">Routes enabled</text>
  </g>

  <g filter="url(#acc-card-shadow)">
    <rect x="362" y="116" width="96" height="40" rx="12" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="382" y="130" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">🔊</text>
    <text x="404" y="130" font-family="system-ui,sans-serif" font-size="8" fill="#0A0F1E" font-weight="600">Audio</text>
    <text x="404" y="143" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748B">Guidance</text>
  </g>

  <g filter="url(#acc-card-shadow)">
    <rect x="362" y="172" width="96" height="40" rx="12" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="382" y="186" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">🚪</text>
    <text x="404" y="186" font-family="system-ui,sans-serif" font-size="8" fill="#0A0F1E" font-weight="600">Lift Priority</text>
    <text x="404" y="199" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748B">Auto routing</text>
  </g>

  <g filter="url(#acc-card-shadow)">
    <rect x="362" y="228" width="96" height="40" rx="12" fill="#1E293B" stroke="#D0EDF8" stroke-width="1"/>
    <text x="382" y="242" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">📱</text>
    <text x="404" y="242" font-family="system-ui,sans-serif" font-size="8" fill="#0A0F1E" font-weight="600">No App</text>
    <text x="404" y="255" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748B">QR scan only</text>
  </g>

  <g filter="url(#acc-card-shadow)">
    <rect x="362" y="284" width="96" height="40" rx="12" fill="#13B7DA"/>
    <text x="410" y="300" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="600" text-anchor="middle">Everyone</text>
    <text x="410" y="313" font-family="system-ui,sans-serif" font-size="7.5" fill="white" opacity="0.8" text-anchor="middle">can navigate</text>
  </g>
</svg>
