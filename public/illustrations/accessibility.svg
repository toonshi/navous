<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <rect width="240" height="180" rx="20" fill="#0A0F1E"/>
  <path d="M0 20H240M0 40H240M0 60H240M0 80H240M0 100H240M0 120H240M0 140H240M0 160H240" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M20 0V180M40 0V180M60 0V180M80 0V180M100 0V180M120 0V180M140 0V180M160 0V180M180 0V180M200 0V180M220 0V180" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>

  {/* Technical Iconography */}
  <circle cx="120" cy="90" r="40" stroke="#FFD60A" stroke-width="2" stroke-opacity="0.2"/>
  <path d="M105 90C105 81.7157 111.716 75 120 75C128.284 75 135 81.7157 135 90" stroke="#FFD60A" stroke-width="2" stroke-linecap="round"/>
  <path d="M110 100H130" stroke="#FFD60A" stroke-width="2" stroke-linecap="round"/>
  <circle cx="120" cy="90" r="10" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
  
  {/* Pulse Effect */}
  <circle cx="120" cy="90" r="50" stroke="#FFD60A" stroke-opacity="0.1">
    <animate attributeName="r" from="40" to="60" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" from="0.1" to="0" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>
