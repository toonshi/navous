<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <!-- Background card -->
  <rect x="20" y="16" width="280" height="208" rx="20" fill="white"/>
  <!-- Floor grid zones -->
  <rect x="36" y="32" width="76" height="60" rx="8" fill="#CAFFBF"/>
  <rect x="120" y="32" width="56" height="60" rx="8" fill="#FDFFB6"/>
  <rect x="184" y="32" width="100" height="60" rx="8" fill="#FFD6A5"/>
  <rect x="36" y="100" width="56" height="56" rx="8" fill="#FFD6A5"/>
  <rect x="100" y="100" width="84" height="56" rx="8" fill="#FFADAD"/>
  <rect x="192" y="100" width="92" height="56" rx="8" fill="#CAFFBF"/>
  <!-- Heat overlays -->
  <ellipse cx="74" cy="60" rx="30" ry="24" fill="#13B7DA" opacity="0.25"/>
  <ellipse cx="74" cy="60" rx="16" ry="13" fill="#13B7DA" opacity="0.45"/>
  <ellipse cx="142" cy="128" rx="36" ry="26" fill="#FFADAD" opacity="0.5"/>
  <ellipse cx="142" cy="128" rx="18" ry="14" fill="#FFADAD" opacity="0.7"/>
  <ellipse cx="230" cy="52" rx="24" ry="18" fill="#FFD6A5" opacity="0.55"/>
  <ellipse cx="230" cy="52" rx="12" ry="10" fill="#FFD6A5" opacity="0.8"/>
  <!-- Movement dots -->
  <circle cx="62" cy="56" r="5" fill="#13B7DA"/>
  <circle cx="80" cy="63" r="4" fill="#13B7DA" opacity="0.7"/>
  <circle cx="93" cy="52" r="3" fill="#13B7DA" opacity="0.45"/>
  <circle cx="130" cy="130" r="5" fill="#FFADAD"/>
  <circle cx="152" cy="122" r="4" fill="#FFADAD" opacity="0.75"/>
  <circle cx="143" cy="142" r="3" fill="#FFADAD" opacity="0.5"/>
  <circle cx="224" cy="48" r="5" fill="#FFD6A5"/>
  <circle cx="238" cy="57" r="4" fill="#FFD6A5" opacity="0.7"/>
  <!-- Legend bar -->
  <rect x="36" y="170" width="248" height="8" rx="4" fill="url(#heatGrad)"/>
  <defs>
    <linearGradient id="heatGrad" x1="36" y1="0" x2="284" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CAFFBF"/>
      <stop offset="33%" stop-color="#FDFFB6"/>
      <stop offset="66%" stop-color="#FFD6A5"/>
      <stop offset="100%" stop-color="#FFADAD"/>
    </linearGradient>
  </defs>
  <text x="36" y="196" font-size="9" fill="#94a3b8" font-family="sans-serif">Low</text>
  <text x="265" y="196" font-size="9" fill="#94a3b8" font-family="sans-serif">High</text>
</svg>
