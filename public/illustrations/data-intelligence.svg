<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <rect width="480" height="360" rx="24" fill="#0A0F1E"/>
  <path d="M0 40H480M0 80H480M0 120H480M0 160H480M0 200H480M0 240H480M0 280H480M0 320H480" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M40 0V360M80 0V360M120 0V360M160 0V360M200 0V360M240 0V360M280 0V360M320 0V360M360 0V360M400 0V360M440 0V360" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>

  {/* Technical Data Visualization */}
  <path d="M80 280V120H160V280" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  <path d="M160 280V180H240V280" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  <path d="M240 280V80H320V280" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  <path d="M320 280V150H400V280" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>

  {/* Heat Zones (Spatial Data) */}
  <circle cx="280" cy="140" r="40" fill="#FFD60A" fill-opacity="0.1"/>
  <circle cx="280" cy="140" r="20" fill="#FFD60A" fill-opacity="0.2"/>
  <circle cx="280" cy="140" r="5" fill="#FFD60A">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite" />
  </circle>

  <circle cx="120" cy="200" r="30" fill="#FFD60A" fill-opacity="0.05"/>
  <circle cx="120" cy="200" r="15" fill="#FFD60A" fill-opacity="0.15"/>
</svg>
