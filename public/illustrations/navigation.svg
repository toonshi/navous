<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  {/* Sophisticated Blueprint Grid */}
  <rect width="480" height="360" rx="24" fill="#0A0F1E"/>
  <path d="M0 40H480M0 80H480M0 120H480M0 160H480M0 200H480M0 240H480M0 280H480M0 320H480" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M40 0V360M80 0V360M120 0V360M160 0V360M200 0V360M240 0V360M280 0V360M320 0V360M360 0V360M400 0V360M440 0V360" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>

  {/* Architectural Walls (Minimalist Line Art) */}
  <path d="M100 80H380V280H100V80Z" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  <path d="M100 180H220V280" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
  <path d="M280 80V180H380" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>

  {/* The Navigation Path (The Hero) */}
  <path d="M140 240V210C140 210 140 190 170 190H310C310 190 340 190 340 160V120" stroke="#FFD60A" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round"/>
  
  {/* The "Blue Dot" Origin */}
  <circle cx="140" cy="240" r="6" fill="#FFD60A"/>
  <circle cx="140" cy="240" r="12" stroke="#FFD60A" stroke-opacity="0.3">
    <animate attributeName="r" from="6" to="18" dur="2s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite" />
  </circle>

  {/* Destination Marker */}
  <path d="M340 100L346 115H334L340 100Z" fill="#FFD60A"/>
</svg>
