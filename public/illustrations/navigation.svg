<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Floor plan card -->
  <rect x="20" y="20" width="260" height="320" rx="24" fill="white"/>
  <!-- Room zones -->
  <rect x="40" y="40" width="90" height="80" rx="10" fill="#CAFFBF"/>
  <rect x="140" y="40" width="120" height="80" rx="10" fill="#FDFFB6"/>
  <rect x="40" y="132" width="220" height="50" rx="10" fill="#FFD6A5" opacity="0.6"/>
  <rect x="40" y="194" width="90" height="80" rx="10" fill="#FFADAD" opacity="0.55"/>
  <rect x="140" y="194" width="120" height="80" rx="10" fill="#CAFFBF" opacity="0.6"/>
  <rect x="40" y="286" width="220" height="34" rx="10" fill="#FDFFB6" opacity="0.5"/>
  <!-- Route path -->
  <path d="M80 320 L80 157 L200 157 L200 80" stroke="#13B7DA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10,6"/>
  <!-- Start badge -->
  <circle cx="80" cy="320" r="12" fill="#FFD6A5" stroke="white" stroke-width="3"/>
  <text x="75" y="325" font-size="12" fill="#0F172A" font-family="sans-serif" font-weight="bold">A</text>
  <!-- Destination pin -->
  <path d="M200 80 C200 62 214 52 228 52 C242 52 256 62 256 80 C256 96 228 116 228 116 Z" fill="#13B7DA"/>
  <circle cx="228" cy="79" r="10" fill="white"/>
  <!-- Person icon -->
  <circle cx="390" cy="120" r="50" fill="#FFD6A5" opacity="0.3"/>
  <circle cx="390" cy="102" r="24" fill="#FFD6A5"/>
  <path d="M364 166 Q364 142 390 142 Q416 142 416 166" fill="#FFD6A5"/>
  <!-- Phone -->
  <rect x="406" y="112" width="30" height="46" rx="8" fill="white"/>
  <rect x="410" y="117" width="22" height="34" rx="5" fill="#13B7DA" opacity="0.1"/>
  <!-- Mini map on phone -->
  <rect x="412" y="120" width="8" height="8" rx="2" fill="#CAFFBF"/>
  <rect x="422" y="120" width="8" height="8" rx="2" fill="#FDFFB6"/>
  <rect x="412" y="130" width="18" height="6" rx="2" fill="#FFD6A5"/>
  <circle cx="416" cy="143" r="4" fill="#13B7DA"/>
  <path d="M413 143 L415 145 L420 138" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Lost person indicator removed — now found! -->
  <circle cx="440" cy="90" r="18" fill="#CAFFBF"/>
  <path d="M433 90 L437 94 L448 82" stroke="#166534" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
