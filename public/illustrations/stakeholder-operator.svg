<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200" fill="none">
  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="#0A0F1E"/>

  <!-- Floor plan top-view -->
  <rect x="44" y="32" width="140" height="106" rx="8" fill="#111827"/>
  <rect x="44" y="32" width="140" height="106" rx="8" fill="none" stroke="#1E293B" stroke-width="1.5"/>
  <!-- Room divisions -->
  <line x1="44" y1="76" x2="184" y2="76" stroke="#1E293B" stroke-width="1"/>
  <line x1="114" y1="32" x2="114" y2="138" stroke="#1E293B" stroke-width="1"/>

  <!-- Heatmap dots -->
  <circle cx="79" cy="54" r="14" fill="#13B7DA" opacity="0.35"/>
  <circle cx="79" cy="54" r="8" fill="#13B7DA" opacity="0.5"/>
  <circle cx="79" cy="54" r="3" fill="#13B7DA"/>

  <circle cx="149" cy="54" r="10" fill="#13B7DA" opacity="0.2"/>
  <circle cx="149" cy="54" r="5" fill="#13B7DA" opacity="0.4"/>

  <circle cx="79" cy="107" r="8" fill="#13B7DA" opacity="0.15"/>
  <circle cx="79" cy="107" r="4" fill="#13B7DA" opacity="0.3"/>

  <circle cx="149" cy="107" r="16" fill="#13B7DA" opacity="0.4"/>
  <circle cx="149" cy="107" r="9" fill="#13B7DA" opacity="0.6"/>
  <circle cx="149" cy="107" r="4" fill="#13B7DA"/>

  <!-- Alert chip -->
  <rect x="58" y="150" width="110" height="22" rx="11" fill="#1E293B"/>
  <circle cx="74" cy="161" r="5" fill="#13B7DA" opacity="0.4"/>
  <circle cx="74" cy="161" r="3" fill="#13B7DA"/>
  <text x="84" y="165" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Lobby bottleneck detected</text>

  <!-- Side stats -->
  <rect x="200" y="32" width="80" height="46" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="240" y="52" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">247</text>
  <text x="240" y="66" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748B" text-anchor="middle">Active visitors</text>

  <rect x="200" y="86" width="80" height="46" rx="8" fill="#13B7DA" opacity="1"/>
  <rect x="200" y="86" width="80" height="46" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="240" y="106" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#13B7DA" text-anchor="middle">3</text>
  <text x="240" y="120" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748B" text-anchor="middle">Alerts</text>

  <rect x="200" y="140" width="80" height="32" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="240" y="160" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748B" text-anchor="middle">Real-time data</text>
</svg>
