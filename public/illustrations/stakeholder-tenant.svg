<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Background -->
  <rect width="320" height="200" fill="#FFD6A5"/>
  <!-- Storefront card -->
  <rect x="24" y="16" width="168" height="168" rx="16" fill="white"/>
  <!-- Awning -->
  <rect x="24" y="16" width="168" height="44" rx="16" fill="#13B7DA"/>
  <rect x="24" y="44" width="168" height="16" fill="#13B7DA"/>
  <!-- Awning stripes -->
  <rect x="44" y="20" width="10" height="40" rx="2" fill="white" opacity="0.2"/>
  <rect x="70" y="20" width="10" height="40" rx="2" fill="white" opacity="0.2"/>
  <rect x="96" y="20" width="10" height="40" rx="2" fill="white" opacity="0.2"/>
  <rect x="122" y="20" width="10" height="40" rx="2" fill="white" opacity="0.2"/>
  <rect x="148" y="20" width="10" height="40" rx="2" fill="white" opacity="0.2"/>
  <!-- Shop window -->
  <rect x="42" y="72" width="72" height="60" rx="8" fill="#FDFFB6"/>
  <!-- Products in window -->
  <circle cx="62" cy="98" r="12" fill="#FFADAD"/>
  <circle cx="86" cy="92" r="10" fill="#CAFFBF"/>
  <circle cx="100" cy="104" r="8" fill="#FFD6A5"/>
  <!-- Door -->
  <rect x="126" y="92" width="48" height="48" rx="6" fill="#f1f5f9"/>
  <circle cx="166" cy="118" r="3" fill="#cbd5e1"/>
  <!-- Store name bar -->
  <rect x="42" y="148" width="132" height="24" rx="6" fill="#CAFFBF"/>
  <!-- Analytics side panel -->
  <rect x="206" y="16" width="100" height="168" rx="16" fill="white"/>
  <text x="216" y="38" font-size="9" fill="#64748b" font-family="sans-serif" font-weight="bold">FOOTFALL TODAY</text>
  <text x="216" y="58" font-size="22" fill="#0F172A" font-family="sans-serif" font-weight="bold">1,248</text>
  <!-- Mini bar chart -->
  <rect x="216" y="130" width="12" height="30" rx="3" fill="#CAFFBF"/>
  <rect x="232" y="118" width="12" height="42" rx="3" fill="#FDFFB6"/>
  <rect x="248" y="108" width="12" height="52" rx="3" fill="#FFD6A5"/>
  <rect x="264" y="96" width="12" height="64" rx="3" fill="#FFADAD"/>
  <rect x="280" y="86" width="12" height="74" rx="3" fill="#13B7DA"/>
  <!-- Trend arrow -->
  <path d="M216 76 L260 62" stroke="#13B7DA" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M252 58 L260 62 L257 70" stroke="#13B7DA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
