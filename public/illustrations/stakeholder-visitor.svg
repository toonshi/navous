<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Background -->
  <rect width="320" height="200" fill="#CAFFBF"/>
  <!-- Map card -->
  <rect x="22" y="18" width="148" height="164" rx="16" fill="white"/>
  <rect x="36" y="32" width="50" height="46" rx="6" fill="#FDFFB6"/>
  <rect x="92" y="32" width="62" height="46" rx="6" fill="#FFD6A5"/>
  <rect x="36" y="84" width="118" height="30" rx="6" fill="#CAFFBF" opacity="0.6"/>
  <rect x="36" y="120" width="50" height="46" rx="6" fill="#FFADAD" opacity="0.5"/>
  <rect x="92" y="120" width="62" height="46" rx="6" fill="#FDFFB6"/>
  <!-- Animated route path -->
  <path d="M60 166 L60 99 L154 99 L154 55" stroke="#13B7DA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,5"/>
  <!-- Start -->
  <circle cx="60" cy="166" r="8" fill="#FFD6A5" stroke="white" stroke-width="2.5"/>
  <!-- Pin -->
  <path d="M154 55 C154 43 164 35 176 35 C188 35 198 43 198 55 C198 67 176 82 176 82 Z" fill="#13B7DA"/>
  <circle cx="176" cy="54" r="7" fill="white"/>
  <!-- Person with phone -->
  <circle cx="268" cy="72" r="34" fill="#FFD6A5" opacity="0.4"/>
  <circle cx="268" cy="60" r="16" fill="#FFD6A5"/>
  <path d="M250 102 Q250 86 268 86 Q286 86 286 102" fill="#FFD6A5"/>
  <rect x="278" y="70" width="22" height="34" rx="6" fill="white"/>
  <rect x="281" y="74" width="16" height="22" rx="3" fill="#13B7DA" opacity="0.12"/>
  <!-- Tiny map on phone -->
  <rect x="283" y="76" width="6" height="6" rx="1" fill="#CAFFBF"/>
  <rect x="291" y="76" width="6" height="6" rx="1" fill="#FDFFB6"/>
  <rect x="283" y="84" width="14" height="4" rx="2" fill="#FFD6A5"/>
  <circle cx="286" cy="92" r="2.5" fill="#13B7DA"/>
  <!-- Step count badges -->
  <rect x="200" y="140" width="100" height="44" rx="12" fill="white"/>
  <text x="215" y="158" font-size="10" fill="#94a3b8" font-family="sans-serif">Steps taken</text>
  <text x="215" y="174" font-size="13" font-weight="bold" fill="#0F172A" font-family="sans-serif">247 / 280m</text>
</svg>
