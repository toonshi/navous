  <rect x="36" y="44" width="248" height="16" fill="#F8FBFC"/>
  <circle cx="56" cy="44" r="5" fill="#E2E8F0"/>
  <circle cx="74" cy="44" r="5" fill="#E2E8F0"/>
  <circle cx="92" cy="44" r="5" fill="#E2E8F0"/>
