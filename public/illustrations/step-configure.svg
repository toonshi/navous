<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <circle cx="160" cy="100" r="82" fill="#D6F0F8"/>
  <!-- Dashboard card -->
  <rect x="36" y="28" width="248" height="152" rx="16" fill="white"/>
