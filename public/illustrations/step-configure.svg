  <rect x="52" y="72" width="64" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="48" y="84" width="72" height="20" rx="6" fill="#13B7DA" opacity="0.12"/>
  <rect x="52" y="89" width="48" height="8" rx="4" fill="#13B7DA" opacity="0.7"/>
