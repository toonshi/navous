<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none">
  <rect width="200" height="150" rx="16" fill="#0A0F1E"/>
  {/* Calibration Line Art */}
  <path d="M40 75H160" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M100 30V120" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  {/* The Precision Dot */}
  <circle cx="100" cy="75" r="4" fill="#FFD60A"/>
  <circle cx="100" cy="75" r="10" stroke="#FFD60A" stroke-opacity="0.3">
    <animate attributeName="r" from="4" to="20" dur="2s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
