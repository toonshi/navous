<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Background -->
  <rect width="320" height="200" fill="#CAFFBF"/>
  <!-- Floor plan card -->
  <rect x="34" y="20" width="148" height="152" rx="16" fill="white"/>
  <rect x="50" y="36" width="50" height="44" rx="6" fill="#FDFFB6"/>
  <rect x="108" y="36" width="58" height="44" rx="6" fill="#FFD6A5"/>
  <rect x="50" y="88" width="116" height="28" rx="6" fill="#FFADAD" opacity="0.5"/>
  <rect x="50" y="122" width="50" height="36" rx="6" fill="#CAFFBF" opacity="0.7"/>
  <rect x="108" y="122" width="58" height="36" rx="6" fill="#FDFFB6"/>
  <!-- Dashed route -->
  <path d="M74 158 L74 102 L140 102 L140 58" stroke="#13B7DA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7,5"/>
  <!-- Start dot -->
  <circle cx="74" cy="158" r="8" fill="#FFADAD" stroke="white" stroke-width="2.5"/>
  <!-- Destination pin -->
  <path d="M140 58 C140 46 150 38 162 38 C174 38 184 46 184 58 C184 70 162 84 162 84 Z" fill="#13B7DA"/>
  <circle cx="162" cy="57" r="7" fill="white"/>
  <!-- Person -->
  <circle cx="258" cy="68" r="30" fill="#FFD6A5"/>
  <circle cx="258" cy="58" r="15" fill="#FFADAD"/>
  <path d="M242 98 Q242 83 258 83 Q274 83 274 98" fill="#FFADAD"/>
  <!-- Phone with map -->
  <rect x="269" y="72" width="20" height="30" rx="5" fill="white"/>
  <rect x="272" y="76" width="14" height="20" rx="3" fill="#13B7DA" opacity="0.15"/>
  <circle cx="275" cy="83" r="3" fill="#13B7DA"/>
  <path d="M273 91 L279 86 L285 90" stroke="#13B7DA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Live badge -->
  <rect x="226" y="38" width="40" height="18" rx="9" fill="#13B7DA"/>
  <circle cx="234" cy="47" r="3" fill="white" opacity="0.8"/>
  <rect x="240" y="43" width="18" height="8" rx="2" fill="white" opacity="0.9"/>
</svg>
