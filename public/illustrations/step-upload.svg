<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200" fill="none">
  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="#F8FAFC"/>

  <!-- Sheet of paper / floor plan -->
  <rect x="80" y="28" width="120" height="144" rx="8" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Grid lines on floor plan -->
  <line x1="80" y1="68" x2="200" y2="68" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="80" y1="108" x2="200" y2="108" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="80" y1="132" x2="200" y2="132" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="120" y1="28" x2="120" y2="172" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="160" y1="28" x2="160" y2="172" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Room outlines -->
  <rect x="88" y="36" width="28" height="24" rx="2" fill="#E2E8F0"/>
  <rect x="122" y="36" width="34" height="24" rx="2" fill="#E2E8F0"/>
  <rect x="88" y="76" width="56" height="26" rx="2" fill="#13B7DA" opacity="0.15"/>
  <rect x="88" y="116" width="40" height="12" rx="2" fill="#E2E8F0"/>
  <rect x="136" y="116" width="24" height="12" rx="2" fill="#E2E8F0"/>

  <!-- Upload arrow -->
  <circle cx="236" cy="90" r="28" fill="#13B7DA" opacity="0.08"/>
  <path d="M236 106 L236 78" stroke="#13B7DA" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M226 88 L236 78 L246 88" stroke="#13B7DA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="222" y1="108" x2="250" y2="108" stroke="#13B7DA" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dotted motion path from paper to upload -->
  <path d="M200 100 Q218 100 208 90" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
</svg>
