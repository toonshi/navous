<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none">
  <rect width="200" height="150" rx="16" fill="#0A0F1E"/>
  {/* Digitization Line Art */}
  <path d="M60 40H140V110H60V40Z" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.5"/>
  <path d="M60 60H140M60 80H140M60 100H140" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
  
  {/* Scanning Line */}
  <path d="M50 50H150" stroke="#FFD60A" stroke-width="2" stroke-opacity="0.8">
    <animate attributeName="d" values="M50 50H150; M50 100H150; M50 50H150" dur="4s" repeatCount="indefinite" />
  </path>
</svg>
